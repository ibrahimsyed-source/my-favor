# Render Blueprint for the My Favor API + Postgres.
# In Render: New ▸ Blueprint ▸ connect this repo. Render reads this file, creates
# the database + web service, then prompts you for the `sync: false` secrets.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: my-favor-db
    plan: free            # 30-day free DB to start; upgrade to a paid plan before launch
    databaseName: myfavor
    user: myfavor

services:
  - type: web
    name: my-favor-api
    runtime: docker
    plan: starter         # ~$7/mo, stays warm (avoid the free tier's cold starts for a real app)
    rootDir: server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the app reads it.
      - key: DATABASE_URL
        fromDatabase:
          name: my-favor-db
          property: connectionString
      # Generated once by Render, kept secret. Must differ from each other.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OTP_DEV_RETURN
        value: "false"
      # Set these in the Render dashboard (kept out of git):
      - key: CORS_ORIGINS          # your app/web origins, comma-separated (never *)
        sync: false
      - key: STRIPE_SECRET_KEY     # sk_live_… (or sk_test_… while testing)
        sync: false
      - key: STRIPE_WEBHOOK_SECRET # whsec_… from your Stripe webhook endpoint
        sync: false
      - key: RESEND_API_KEY        # email provider for OTP codes
        sync: false
      - key: OTP_FROM_EMAIL        # verified sender, e.g. My Favor <noreply@yourdomain.com>
        sync: false
